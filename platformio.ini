[platformio]
src_dir = ESP32CAM-ONVIF
default_envs = esp32cam

; ==============================================================================
;   Common settings for all ESP32 camera boards
; ==============================================================================
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
lib_deps = 
    https://github.com/geeksville/Micro-RTSP.git
    bblanchon/ArduinoJson @ ^6.21.3
    madhephaestus/ESP32Servo @ ^1.1.1
    h2zero/NimBLE-Arduino @ ^1.4.2
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -Os
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

; ==============================================================================
;   ESP32 Boards (Classic)
; ==============================================================================

; AI-Thinker ESP32-CAM (Most Common)
[env:esp32cam]
board = esp32cam
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.partitions = huge_app.csv

; ==============================================================================
;   ESP32-P4 Boards (Support Hardware H.264 - Future)
; ==============================================================================

; ESP32-P4-Function-EV-Board (when supported by PlatformIO)
; [env:esp32p4_function_ev]
; board = esp32p4
